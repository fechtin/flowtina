# Flowtina nginx site config.
# Place at /etc/nginx/sites-available/flowtina and symlink into sites-enabled.
# Run `certbot --nginx` afterwards to provision TLS and the HTTP->HTTPS redirect.

server {
    listen 80;
    server_name _;

    # Frontend static build
    root /opt/flowtina/frontend/dist;
    index index.html;

    client_max_body_size 20M;

    # API reverse proxy
    location /api/ {
        proxy_pass http://127.0.0.1:8000;
        proxy_http_version 1.1;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
        proxy_read_timeout 120s;
    }

    location /docs {
        proxy_pass http://127.0.0.1:8000/docs;
        proxy_set_header Host $host;
    }

    # Content-hashed build assets are immutable and safe to cache forever.
    location /assets/ {
        add_header Cache-Control "public, max-age=31536000, immutable";
        try_files $uri =404;
    }

    # index.html must always be revalidated so new deploys are picked up
    # immediately (it references the hashed asset filenames).
    location = /index.html {
        add_header Cache-Control "no-cache";
    }

    # SPA fallback
    location / {
        try_files $uri $uri/ /index.html;
    }

    gzip on;
    gzip_types text/css application/javascript application/json image/svg+xml;
    gzip_min_length 1024;
}
